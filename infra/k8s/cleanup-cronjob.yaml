# CronJob to run orphan cleanup daily

apiVersion: batch/v1
kind: CronJob
metadata:
  name: pe-cleanup-orphans
  namespace: default
spec:
  schedule: "0 3 * * *" # daily at 03:00
  jobTemplate:
    spec:
      template:
        spec:
          serviceAccountName: supabase-worker-sa
          containers:
            - name: cleanup-orphans
              image: node:18-slim
              command: ["node", "/work/cleanup-orphans.js"]
              env:
                - name: SUPABASE_URL
                  valueFrom:
                    secretKeyRef:
                      name: supabase-credentials
                      key: SUPABASE_URL
                - name: SUPABASE_SERVICE_ROLE_KEY
                  valueFrom:
                    secretKeyRef:
                      name: supabase-credentials
                      key: SUPABASE_SERVICE_ROLE_KEY
                - name: SCAN_BUCKET
                  value: "inquiry-attachments"
              volumeMounts:
                - name: workdir
                  mountPath: /work
          restartPolicy: OnFailure
          volumes:
            - name: workdir
              configMap:
                name: pe-cleanup-scripts
