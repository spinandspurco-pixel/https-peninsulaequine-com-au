name: Verify internal links

# Runs scripts/verify-internal-links.ts on every PR. The script parses
# <Route path="..."> entries from src/App.tsx and scans every
# `to="/..."` / `href="/..."` reference in src/, failing the build if
# any link points to a non-existent route or to a `#anchor` whose id
# doesn't appear in source. Blocks merges on broken footer/nav/CTA links.

on:
  pull_request:
    branches: [main]
    paths:
      - "src/**"
      - "public/**"
      - "scripts/verify-internal-links.ts"
      - "package.json"
      - "bun.lockb"
      - ".github/workflows/verify-internal-links.yml"
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: verify-internal-links-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Crawl internal links
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
      checks: write
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Verify internal links
        run: bunx tsx scripts/verify-internal-links.ts
