name: Preview Mint Gate

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  preview-mint-check:
    name: Scan for forbidden preview data
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install ripgrep
        run: sudo apt-get update && sudo apt-get install -y ripgrep

      - name: Run Preview Mint Gate (codebase scan)
        run: bash scripts/preview-mint-check.sh
