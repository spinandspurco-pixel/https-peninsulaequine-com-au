name: Preview Mint Gate

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  preview-mint-check:
    name: Scan for forbidden preview data
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install ripgrep
        run: sudo apt-get update && sudo apt-get install -y ripgrep

      - name: Gate self-test (safe + unsafe fixtures)
        run: bash scripts/preview-mint-check.test.sh

      - name: Gate scan (real codebase)
        run: bash scripts/preview-mint-check.sh

