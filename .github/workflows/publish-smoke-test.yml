name: Publish Smoke Test

# Verifies the live site after every deployment:
#   1. Homepage loads
#   2. /hq route renders
#   3. /login renders
#   4. Hero asset bundle hash matches the latest build
#
# Triggers:
#   - workflow_dispatch     — manual, e.g. immediately after clicking Update
#   - repository_dispatch   — fired by an external webhook on deploy success
#                             (event_type: "deployment-succeeded")
#   - push to main          — rebuilds dist/ then compares against live
#   - schedule (*/2 min)    — lightweight watcher; only runs the full smoke
#                             test when the live bundle hash has changed
#                             since the last observed deploy. Acts as the
#                             automatic post-deploy trigger when no webhook
#                             is wired up.

on:
  workflow_dispatch:
    inputs:
      base_url:
        description: "Base URL to smoke-test"
        required: false
        default: "https://peninsulaequine.systems"
      force:
        description: "Run even if the live bundle hash has not changed"
        required: false
        default: "false"
  repository_dispatch:
    types: [deployment-succeeded]
  schedule:
    # Poll every 2 minutes; the watcher step short-circuits when the live
    # bundle hash is unchanged, so this is cheap.
    - cron: "*/2 * * * *"
  push:
    branches: [main]

concurrency:
  group: publish-smoke-${{ github.ref }}
  cancel-in-progress: true

jobs:
  smoke:
    name: Verify live deployment
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      # ── Watcher: only run the full smoke test when the live bundle hash
      # has changed since the previous run. On manual/push/webhook triggers
      # we always run. On schedule triggers we skip when unchanged.
      - name: Detect live bundle hash
        id: detect
        env:
          SMOKE_BASE_URL: ${{ github.event.inputs.base_url || 'https://peninsulaequine.systems' }}
        run: |
          html="$(curl -sSL "$SMOKE_BASE_URL/")"
          # Match the hashed main entry bundle (e.g. /assets/index-XXXX.js or
          # a Lovable CDN /__l5e/assets-v1/...index-XXXX.js path).
          hash="$(printf '%s' "$html" | grep -oE 'index-[A-Za-z0-9_-]+\.js' | head -n1 || true)"
          if [ -z "$hash" ]; then
            # Fall back to hero asset filename as a deploy fingerprint.
            hash="$(printf '%s' "$html" | grep -oE 'approved-aberdeen-rider-exterior-storm[A-Za-z0-9._-]*\.(webp|png)' | head -n1 || true)"
          fi
          echo "live_hash=$hash" >> "$GITHUB_OUTPUT"
          echo "Live bundle fingerprint: ${hash:-<none>}"

      - name: Restore last-seen bundle hash
        id: cache-hash
        uses: actions/cache@v4
        with:
          path: .last-smoke-hash
          key: publish-smoke-last-hash-v1

      - name: Decide whether to run
        id: gate
        run: |
          trigger="${{ github.event_name }}"
          force="${{ github.event.inputs.force }}"
          live="${{ steps.detect.outputs.live_hash }}"
          last="$(cat .last-smoke-hash 2>/dev/null || true)"
          echo "trigger=$trigger last=$last live=$live force=$force"
          run="true"
          if [ "$trigger" = "schedule" ] && [ "$force" != "true" ]; then
            if [ -n "$live" ] && [ "$live" = "$last" ]; then
              run="false"
            fi
          fi
          echo "run=$run" >> "$GITHUB_OUTPUT"
          if [ "$run" = "false" ]; then
            echo "Live bundle unchanged since last run — skipping full smoke test."
          fi

      - name: Setup Bun
        if: steps.gate.outputs.run == 'true'
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Cache Bun dependencies
        if: steps.gate.outputs.run == 'true'
        uses: actions/cache@v4
        with:
          path: |
            ~/.bun/install/cache
            node_modules
          key: ${{ runner.os }}-bun-v2-${{ hashFiles('bun.lock', 'bun.lockb') }}
          restore-keys: |
            ${{ runner.os }}-bun-v2-

      - name: Install dependencies
        if: steps.gate.outputs.run == 'true'
        run: bun install --frozen-lockfile

      # Shared build cache — see strict-build.yml for the full pattern.
      # Only meaningful for push/PR runs where we actually build; the
      # schedule/webhook branches skip the build entirely below.
      - name: Cache build output (dist + Vite deps)
        id: build-cache
        if: steps.gate.outputs.run == 'true' && github.event_name != 'schedule' && github.event_name != 'repository_dispatch'
        uses: actions/cache@v4
        with:
          path: |
            dist
            node_modules/.vite
          key: ${{ runner.os }}-dist-v2-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-dist-v2-

      # Build locally so the hero-asset hash check has a baseline to compare
      # against. On schedule/webhook runs we skip the build and the check
      # soft-passes.
      - name: Build (for asset hash comparison)
        if: steps.gate.outputs.run == 'true' && github.event_name != 'schedule' && github.event_name != 'repository_dispatch' && steps.build-cache.outputs.cache-hit != 'true'
        run: bun run build

      - name: Run publish smoke test
        id: smoke
        if: steps.gate.outputs.run == 'true'
        env:
          SMOKE_BASE_URL: ${{ github.event.inputs.base_url || 'https://peninsulaequine.systems' }}
          SMOKE_SUMMARY_PATH: ${{ github.workspace }}/smoke-summary.json
        run: |
          if [ "${{ github.event_name }}" = "schedule" ] || [ "${{ github.event_name }}" = "repository_dispatch" ]; then
            node scripts/publish-smoke-test.mjs --skip-local-build-check
          else
            node scripts/publish-smoke-test.mjs
          fi

      - name: Record observed bundle hash
        if: steps.gate.outputs.run == 'true' && steps.detect.outputs.live_hash != ''
        run: printf '%s' "${{ steps.detect.outputs.live_hash }}" > .last-smoke-hash

      # ── Failure notification: write a clear GitHub step summary and
      # open (or update) a single tracking issue so failures are visible
      # without subscribing to workflow email noise.
      - name: Build failure summary
        id: failmsg
        if: failure() && steps.gate.outputs.run == 'true'
        env:
          BASE: ${{ github.event.inputs.base_url || 'https://peninsulaequine.systems' }}
          LIVE_HASH: ${{ steps.detect.outputs.live_hash }}
          TRIGGER: ${{ github.event_name }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set -e
          ts="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          summary_file="${GITHUB_WORKSPACE}/smoke-summary.json"
          failed_lines=""
          if [ -f "$summary_file" ]; then
            failed_lines="$(node -e "
              const s=require('$summary_file');
              for (const f of s.failed_checks||[]) {
                console.log('- **'+f.name+'**'+(f.detail?' — '+f.detail:''));
              }
            ")"
          fi
          [ -z "$failed_lines" ] && failed_lines="- (no machine-readable summary; see job logs)"

          {
            echo "## ❌ Publish smoke test failed"
            echo ""
            echo "| field | value |"
            echo "| --- | --- |"
            echo "| Live URL | $BASE |"
            echo "| Live bundle hash | \`${LIVE_HASH:-<none>}\` |"
            echo "| Trigger | $TRIGGER |"
            echo "| Timestamp (UTC) | $ts |"
            echo "| Run | $RUN_URL |"
            echo ""
            echo "### Failed checks"
            echo "$failed_lines"
          } >> "$GITHUB_STEP_SUMMARY"

          {
            echo "## ❌ Publish smoke test failed"
            echo ""
            echo "- **Live URL:** $BASE"
            echo "- **Live bundle hash:** \`${LIVE_HASH:-<none>}\`"
            echo "- **Trigger:** $TRIGGER"
            echo "- **Timestamp (UTC):** $ts"
            echo "- **Run:** $RUN_URL"
            echo ""
            echo "### Failed checks"
            echo "$failed_lines"
            echo ""
            echo "_This issue auto-closes on the next successful run._"
          } > failure-body.md

          {
            echo "body<<EOF"
            cat failure-body.md
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Open or update tracking issue on failure
        if: failure() && steps.gate.outputs.run == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BODY: ${{ steps.failmsg.outputs.body }}
        run: |
          set -e
          title="Publish smoke test failing on peninsulaequine.systems"
          existing="$(gh issue list --state open --search "$title in:title" --json number --jq '.[0].number' || true)"
          if [ -n "$existing" ] && [ "$existing" != "null" ]; then
            printf '%s' "$BODY" | gh issue comment "$existing" --body-file -
          else
            printf '%s' "$BODY" | gh issue create --title "$title" --label "smoke-test,production" --body-file -
          fi

      - name: Auto-close tracking issue on success
        if: success() && steps.gate.outputs.run == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          title="Publish smoke test failing on peninsulaequine.systems"
          existing="$(gh issue list --state open --search "$title in:title" --json number --jq '.[0].number' || true)"
          if [ -n "$existing" ] && [ "$existing" != "null" ]; then
            gh issue comment "$existing" --body "✅ Smoke test recovered at $(date -u +%Y-%m-%dT%H:%M:%SZ). Closing."
            gh issue close "$existing"
          fi

