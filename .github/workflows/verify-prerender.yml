name: Verify prerendered head tags

# Runs `vite build` (which triggers the postbuild chain:
# scripts/prerender.ts then scripts/verify-prerender.ts) so any
# regression in per-route <title>, description, canonical, og:*, or
# twitter:* tags fails the PR check before merge.

on:
  pull_request:
    branches: [main]
    paths:
      - "src/**"
      - "public/**"
      - "scripts/prerender.ts"
      - "scripts/verify-prerender.ts"
      - "index.html"
      - "package.json"
      - "bun.lockb"
      - "vite.config.ts"
      - ".github/workflows/verify-prerender.yml"
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: verify-prerender-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Build + verify head tags
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # `checks: write` lets the verifier's `::error file=...,title=...`
    # workflow commands attach inline annotations to the PR's Files
    # Changed tab. `pull-requests: write` lets the job summary render
    # on the PR's Checks tab.
    permissions:
      contents: read
      checks: write
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      # Build first (vite build only). We split prerender + verify into
      # their own steps so a verifier failure is attributed to the
      # right step in the PR Checks UI, not buried in build output.
      - name: Build
        run: bunx vite build

      - name: Prerender public routes
        run: bunx tsx scripts/prerender.ts

      - name: Verify per-route head tags (annotates PR on failure)
        run: bunx tsx scripts/verify-prerender.ts

      - name: Confirm prerendered routes exist
        if: always()
        run: |
          set -e
          for route in arenas stables equine-estates infrastructure gallery about contact process testimonials faq privacy terms; do
            test -f "dist/${route}/index.html" || { echo "missing dist/${route}/index.html"; exit 1; }
          done
          test -f dist/index.html
          echo "all 13 prerendered HTML files present"

