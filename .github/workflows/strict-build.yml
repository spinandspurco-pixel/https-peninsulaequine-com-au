name: Strict Build

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: strict-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  strict-build:
    name: TypeScript · Tailwind · Prerender · Internal links
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      # Cache Bun's global install cache + node_modules keyed by the lockfile.
      # On a cache hit, `bun install` short-circuits to a near-no-op; on a miss
      # (lockfile change) we repopulate and `actions/cache` saves the new key
      # at job end. Restore-keys let us fall back to the most recent cache for
      # the same OS even when the lockfile changes, so we still skip the
      # network for most packages.
      - name: Cache Bun dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.bun/install/cache
            node_modules
          key: ${{ runner.os }}-bun-v2-${{ hashFiles('bun.lock', 'bun.lockb') }}
          restore-keys: |
            ${{ runner.os }}-bun-v2-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      # Full-project typecheck via the root tsconfig's project references
      # (tsconfig.app.json + tsconfig.node.json). Using `tsc -b --force`
      # ensures non-app files like vite.config.ts are also verified, not just
      # the src/ tree picked up by tsconfig.app.json.
      - name: TypeScript typecheck (full project, all references)
        run: bunx tsc -b --force --pretty

      # Focused canary: typecheck src/pages/HqDeployHealth.tsx in isolation
      # so stale TS1472 (and other) errors on that file surface as a clearly
      # attributable step, not buried in the full project build log.
      # Uses tsconfig.app.json so path aliases + lib settings match runtime.
      - name: TypeScript canary — HqDeployHealth.tsx (guards against TS1472)
        run: |
          set -o pipefail
          bunx tsc --noEmit -p tsconfig.app.json --pretty 2>&1 | tee /tmp/tsc-full.log
          if grep -E "src/pages/HqDeployHealth\.tsx.*error TS" /tmp/tsc-full.log; then
            echo "::error file=src/pages/HqDeployHealth.tsx::TypeScript errors detected in HqDeployHealth.tsx"
            exit 1
          fi


      # Shared build cache — reused across strict-build, verify-prerender,
      # verify-accessibility, and publish-smoke-test on the same commit SHA.
      # First workflow to finish uploads dist/; the rest restore and skip
      # the rebuild. `node_modules/.vite` speeds up Vite dep prebundling
      # even on a cache miss (restored via the fallback key).
      - name: Cache build output (dist + Vite deps)
        id: build-cache
        uses: actions/cache@v4
        with:
          path: |
            dist
            node_modules/.vite
          key: ${{ runner.os }}-dist-v2-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-dist-v2-

      # Runs prebuild (verify-assets) → strict build (fails on Tailwind/PostCSS warnings)
      # → postbuild (prerender + verify-prerender + verify-internal-links).
      # Any failure in this chain blocks the merge.
      - name: Strict build (Tailwind + PostCSS + prerender + internal links)
        if: steps.build-cache.outputs.cache-hit != 'true'
        run: bun run build

      # ESLint — catches style violations and likely-bug patterns
      # (no-explicit-any, no-require-imports, exhaustive-deps, etc.) before
      # we spend time typechecking tests or booting vitest/Playwright.
      # Runs the same `eslint .` config developers use locally via `bun run lint`.
      - name: ESLint
        run: bun run lint

      # Typecheck test files explicitly against tsconfig.app.json so missing
      # types (e.g. `node`, `vitest/globals`) or broken imports in *.test.ts(x)
      # fail CI before vitest ever boots its runner.
      - name: TypeScript typecheck (test files)
        run: bunx tsc --noEmit -p tsconfig.app.json

      # Unit tests (vitest) with v8 coverage — fails the build if coverage
      # drops below the agreed thresholds defined in vitest.config.ts. Also
      # includes the HqHeader regression guarding that no Sign Out button or
      # HQ chrome leaks onto /login for unauthenticated visitors.
      - name: Unit tests (vitest) + coverage thresholds
        run: bun run test:coverage

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: vitest-coverage
          path: coverage/
          if-no-files-found: ignore
          retention-days: 14

      # Cache Playwright's browser binaries keyed by the resolved Playwright
      # version in the lockfile. On a hit we skip the ~100MB chromium
      # download and only run `--with-deps` to ensure system libs are present.
      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-v2-${{ hashFiles('bun.lock', 'bun.lockb') }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: Install Playwright browser
        run: |
          if [ "${{ steps.playwright-cache.outputs.cache-hit }}" = "true" ]; then
            bunx playwright install-deps chromium
          else
            bunx playwright install --with-deps chromium
          fi

      # Anonymous Playwright suite — covers protected-route redirects plus the
      # /login header/sign-out regression checks. Restricted to @anon so we
      # don't require auth fixtures here.
      - name: E2E anon suite (Playwright)
        run: bunx playwright test --project=anon-desktop

