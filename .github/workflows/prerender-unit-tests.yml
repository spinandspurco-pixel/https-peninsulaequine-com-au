name: Prerender unit tests

# Runs the prerender-verification unit tests on every pull request
# so regressions in checkHtml structured-failure logic are caught
# before merge.  No build step is required — the tests exercise
# the pure checking logic directly.

on:
  pull_request:
    branches: [main]
    paths:
      - "scripts/verify-prerender-core.ts"
      - "scripts/verify-prerender.ts"
      - "src/test/prerender-verify.test.ts"
      - "scripts/prerender-verify.schema.json"
      - "package.json"
      - "bun.lockb"
      - "vitest.config.ts"
      - ".github/workflows/prerender-unit-tests.yml"
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: prerender-unit-tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Run prerender verify unit tests (${{ matrix.runtime }})
    runs-on: ubuntu-latest
    timeout-minutes: 5
    strategy:
      fail-fast: false
      matrix:
        runtime: [bun, node]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        if: matrix.runtime == 'bun'
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Cache Bun dependencies
        if: matrix.runtime == 'bun'
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lockb') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Setup Node
        if: matrix.runtime == 'node'
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies (Bun)
        if: matrix.runtime == 'bun'
        run: bun install --frozen-lockfile

      - name: Install dependencies (Node)
        if: matrix.runtime == 'node'
        run: npm ci

      - name: Run prerender-verify unit tests (Bun)
        if: matrix.runtime == 'bun'
        run: bun vitest run src/test/prerender-verify.test.ts

      - name: Run prerender-verify unit tests (Node)
        if: matrix.runtime == 'node'
        run: npx vitest run src/test/prerender-verify.test.ts
