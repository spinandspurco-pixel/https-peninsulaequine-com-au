name: Prerender unit tests

# Runs the prerender-verification unit tests on every pull request
# so regressions in checkHtml structured-failure logic are caught
# before merge.  No build step is required — the tests exercise
# the pure checking logic directly.

on:
  pull_request:
    branches: [main]
    paths:
      - "scripts/verify-prerender-core.ts"
      - "scripts/verify-prerender.ts"
      - "src/test/prerender-verify.test.ts"
      - "scripts/prerender-verify.schema.json"
      - "package.json"
      - "bun.lockb"
      - "vitest.config.ts"
      - ".github/workflows/prerender-unit-tests.yml"
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: prerender-unit-tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Run prerender verify unit tests
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run prerender-verify unit tests
        run: bun vitest run src/test/prerender-verify.test.ts
