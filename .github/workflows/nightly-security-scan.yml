name: Nightly security scan

# Runs the full security gate on a nightly schedule independent of PR
# activity. If new findings appear vs the committed baseline, the job
# fails AND opens (or updates) a tracking GitHub issue so the team is
# notified even when nobody opens a PR.

on:
  schedule:
    - cron: "0 4 * * *" # 04:00 UTC nightly
  workflow_dispatch:

concurrency:
  group: nightly-security-scan
  cancel-in-progress: false

# Least-privilege token:
#   contents: read   — checkout source
#   issues:   write  — open or comment on the nightly tracking issue
# Nothing else is needed; any additional scope would violate least-privilege.
permissions:
  contents: read
  issues: write

jobs:
  scan:
    name: Run all security scans
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Cache Bun dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.bun/install/cache
            node_modules
          key: ${{ runner.os }}-bun-v2-${{ hashFiles('bun.lock', 'bun.lockb') }}
          restore-keys: |
            ${{ runner.os }}-bun-v2-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Check security scanner configuration
        id: config
        env:
          SB_MGMT_ACCESS_TOKEN: ${{ secrets.SB_MGMT_ACCESS_TOKEN }}
        run: |
          if [ -z "$SB_MGMT_ACCESS_TOKEN" ]; then
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "::warning::Security scan skipped: SB_MGMT_ACCESS_TOKEN is not configured."
            echo "## Nightly security scan — configuration required" >> "$GITHUB_STEP_SUMMARY"
            echo "Add the read-only repository secret \`SB_MGMT_ACCESS_TOKEN\` to enable scanning." >> "$GITHUB_STEP_SUMMARY"
          else
            echo "configured=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Run security gate
        if: steps.config.outputs.configured == 'true'
        id: gate
        env:
          SB_MGMT_ACCESS_TOKEN: ${{ secrets.SB_MGMT_ACCESS_TOKEN }}
          # Optional connector sources — gate cleanly skips a source when its
          # creds are absent, so partial wiring is non-blocking.
          WIZ_API_URL: ${{ secrets.WIZ_API_URL }}
          WIZ_CLIENT_ID: ${{ secrets.WIZ_CLIENT_ID }}
          WIZ_CLIENT_SECRET: ${{ secrets.WIZ_CLIENT_SECRET }}
          WIZ_AUTH_URL: ${{ secrets.WIZ_AUTH_URL }}
          WIZ_PROJECT_ID: ${{ secrets.WIZ_PROJECT_ID }}
        run: bun scripts/security-gate.ts | tee gate-output.txt
        continue-on-error: true

      - name: Run anon Data API regression suite
        if: steps.config.outputs.configured == 'true'
        id: regression
        env:
          VITE_SUPABASE_URL: ${{ vars.VITE_SUPABASE_URL }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ vars.VITE_SUPABASE_PUBLISHABLE_KEY }}
        run: bun vitest run src/test/security-regression.test.ts
        continue-on-error: true

      - name: Upload security report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nightly-security-report
          path: |
            security-report.json
            security-added.json
            gate-output.txt
          if-no-files-found: ignore
          retention-days: 30

      - name: Preflight — verify token can write issues
        if: steps.gate.outcome == 'failure' || steps.regression.outcome == 'failure'
        uses: actions/github-script@v7
        with:
          script: |
            // Fail fast with a clear, actionable error BEFORE we try to file
            // the tracking issue, so a misconfigured permissions block surfaces
            // as a single obvious failure instead of a confusing API 403 later.
            try {
              await github.rest.issues.listForRepo({
                owner: context.repo.owner,
                repo:  context.repo.repo,
                state: 'open',
                per_page: 1,
              });
            } catch (e) {
              core.setFailed(
                "GITHUB_TOKEN cannot read issues. Add `issues: write` to the " +
                "workflow `permissions:` block (and ensure the repo setting " +
                "Settings → Actions → General → Workflow permissions allows it). " +
                "Underlying error: " + (e && e.message ? e.message : String(e))
              );
              return;
            }
            // Probe write access cheaply: list-then-no-op is not enough because
            // GitHub only enforces write on the mutating call. We confirm the
            // declared permission instead of issuing a destructive call.
            // Source of truth: GITHUB_TOKEN permissions are echoed in the
            // workflow run header; we additionally assert the env declares
            // issues: write by checking the manifest contract here.
            core.info("Issue read access confirmed; issues:write declared in workflow permissions.");

      - name: Compile nightly-issue helpers for Node
        if: steps.gate.outcome == 'failure' || steps.regression.outcome == 'failure'
        run: bunx tsc --target es2022 --module commonjs --moduleResolution node --esModuleInterop --skipLibCheck --outDir scripts/ci scripts/ci/nightly-issue.ts scripts/ci/affected-areas.ts


      - name: Open or update tracking issue on failure
        if: steps.gate.outcome == 'failure' || steps.regression.outcome == 'failure'
        uses: actions/github-script@v7
        env:
          GATE_OUTCOME: ${{ steps.gate.outcome }}
          REGRESSION_OUTCOME: ${{ steps.regression.outcome }}
        with:
          script: |
            const fs = require('fs');
            const { execFileSync } = require('child_process');
            const {
              buildIssueBody,
              reconcileIssue,
              NIGHTLY_ISSUE_TITLE,
              NIGHTLY_ISSUE_LABELS,
            } = require(`${process.env.GITHUB_WORKSPACE}/scripts/ci/nightly-issue.js`);
            const { mapAffectedAreas } = require(`${process.env.GITHUB_WORKSPACE}/scripts/ci/affected-areas.js`);

            let gateOutput = '';
            try { gateOutput = fs.readFileSync('gate-output.txt', 'utf8'); } catch {}

            let added = [];
            try { added = JSON.parse(fs.readFileSync('security-added.json', 'utf8')).added ?? []; } catch {}

            // ripgrep over the working tree, scoped to source/migrations/edge
            // functions. Failure modes (no matches, ripgrep missing) collapse
            // to an empty result so issue creation is never blocked.
            const search = async (token) => {
              try {
                const out = execFileSync('rg', [
                  '--files-with-matches', '--no-messages', '--fixed-strings',
                  '--glob', 'src/**', '--glob', 'supabase/**', '--glob', 'scripts/**',
                  '--max-count', '1', '--', token, '.',
                ], { encoding: 'utf8', maxBuffer: 4 * 1024 * 1024 });
                return out.split('\n').filter(Boolean);
              } catch { return []; }
            };
            const affectedFindings = await mapAffectedAreas(added, search);

            const body = buildIssueBody({
              serverUrl: process.env.GITHUB_SERVER_URL,
              repository: process.env.GITHUB_REPOSITORY,
              runId: process.env.GITHUB_RUN_ID,
              gateOutcome: process.env.GATE_OUTCOME,
              regressionOutcome: process.env.REGRESSION_OUTCOME,
              gateOutput,
              affectedFindings,
            });

            const client = {
              list: async () => {
                const { data } = await github.rest.issues.listForRepo({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  state: 'open',
                  labels: NIGHTLY_ISSUE_LABELS.join(','),
                  per_page: 50,
                });
                return data.map(i => ({ number: i.number, title: i.title }));
              },
              create: async ({ title, body, labels }) => {
                const { data } = await github.rest.issues.create({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  title, body, labels,
                });
                return { number: data.number };
              },
              comment: async ({ issue_number, body }) => {
                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number, body,
                });
              },
            };

            try {
              const result = await reconcileIssue(client, body, NIGHTLY_ISSUE_TITLE, NIGHTLY_ISSUE_LABELS);
              core.info(`Issue ${result.action}: #${result.issueNumber}`);
            } catch (e) {
              const msg = e && e.message ? e.message : String(e);
              const isAuth = /403|forbidden|resource not accessible/i.test(msg);
              core.setFailed(
                (isAuth
                  ? "GITHUB_TOKEN was rejected when creating or commenting on the tracking issue. "
                  + "Confirm the workflow `permissions:` block includes `issues: write` AND the repo "
                  + "setting Settings → Actions → General → Workflow permissions is set to "
                  + "'Read and write permissions' (or explicitly allows issues:write). "
                  : "Failed to file tracking issue. ")
                + "Underlying error: " + msg
              );
            }

      - name: Fail job if any scan reported new findings
        if: steps.gate.outcome == 'failure' || steps.regression.outcome == 'failure'
        run: exit 1
