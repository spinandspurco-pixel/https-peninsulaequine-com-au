name: Verify asset pointers

# Fails the PR if any `*.asset.json` import in src/ resolves to a missing
# file on disk. Emits inline `::error file=...` annotations so reviewers
# see the broken import on the Files Changed tab instead of digging into
# a downstream Rollup ENOENT.

on:
  pull_request:
    branches: [main]
    paths:
      - "src/**"
      - "scripts/verify-assets.ts"
      - "package.json"
      - "bun.lockb"
      - ".github/workflows/verify-assets.yml"
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: verify-assets-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Scan for missing .asset.json references
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
      checks: write
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Verify asset pointers (annotates PR on failure)
        id: verify
        run: bunx tsx scripts/verify-assets.ts > asset-scan-report.txt 2>&1
        continue-on-error: true

      - name: Upload scan report
        if: steps.verify.outcome != 'skipped'
        uses: actions/upload-artifact@v4
        with:
          name: asset-scan-report
          path: asset-scan-report.txt
          retention-days: ${{ vars.ASSET_SCAN_RETENTION_DAYS || 30 }}

      - name: Fail if verification failed
        if: steps.verify.outcome == 'failure'
        run: |
          cat asset-scan-report.txt
          exit 1
