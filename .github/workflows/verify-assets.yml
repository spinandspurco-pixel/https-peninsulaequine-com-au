name: Verify asset pointers

# Fails the PR if any `*.asset.json` import in src/ resolves to a missing
# file on disk. Emits inline `::error file=...` annotations so reviewers
# see the broken import on the Files Changed tab instead of digging into
# a downstream Rollup ENOENT.

on:
  pull_request:
    branches: [main]
    paths:
      - "src/**"
      - "scripts/verify-assets.ts"
      - "package.json"
      - "bun.lockb"
      - ".github/workflows/verify-assets.yml"
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      retention_days:
        description: "Artifact retention in days (overrides repo variable for this run)"
        required: false
        type: number
        default: 30

concurrency:
  group: verify-assets-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Scan for missing .asset.json references
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
      checks: write
      pull-requests: write
    steps:
      - name: Validate retention_days
        if: github.event_name == 'workflow_dispatch'
        run: |
          INPUT="${{ inputs.retention_days }}"
          if ! [[ "$INPUT" =~ ^[0-9]+$ ]] || [ "$INPUT" -lt 1 ]; then
            echo "::error::Invalid retention_days: '$INPUT'. Must be a positive integer (1 or greater)."
            exit 1
          fi

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Verify asset pointers (annotates PR on failure)
        id: verify
        run: bunx tsx scripts/verify-assets.ts > asset-scan-report.txt 2>&1
        continue-on-error: true

      - name: Determine valid retention days
        id: retention
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            DAYS="${{ inputs.retention_days }}"
            SOURCE="workflow_dispatch input"
          else
            DAYS="${{ vars.ASSET_SCAN_RETENTION_DAYS }}"
            SOURCE="ASSET_SCAN_RETENTION_DAYS repository variable"
          fi
          if [ -z "$DAYS" ]; then
            DAYS=30
            SOURCE="fallback (default)"
          elif ! [[ "$DAYS" =~ ^[0-9]+$ ]] || [ "$DAYS" -lt 1 ]; then
            echo "::warning::ASSET_SCAN_RETENTION_DAYS is invalid ('$DAYS'). Falling back to 30 days."
            DAYS=30
            SOURCE="fallback (ASSET_SCAN_RETENTION_DAYS invalid)"
          fi
          echo "days=$DAYS" >> "$GITHUB_OUTPUT"
          echo "Artifact retention set to $DAYS day(s)"
          echo "### Artifact Retention" >> "$GITHUB_STEP_SUMMARY"
          echo "Retention period: **$DAYS day(s)**" >> "$GITHUB_STEP_SUMMARY"
          echo "Source: $SOURCE" >> "$GITHUB_STEP_SUMMARY"
          echo "Workflow run ID: ${{ github.run_id }}" >> "$GITHUB_STEP_SUMMARY"
          echo "Artifact name: asset-scan-report" >> "$GITHUB_STEP_SUMMARY"

      - name: Upload scan report
        id: upload-report
        if: steps.verify.outcome != 'skipped'
        uses: actions/upload-artifact@v4
        with:
          name: asset-scan-report
          path: asset-scan-report.txt
          retention-days: ${{ steps.retention.outputs.days }}

      - name: Add artifact download link to summary
        id: summary
        if: steps.upload-report.outcome == 'success'
        shell: bash
        run: |
          set -euo pipefail
          SIZE=$(stat -c%s asset-scan-report.txt)
          TS=$(date -u +"%Y-%m-%d %H:%M:%S UTC")
          CHECKSUM=$(sha256sum asset-scan-report.txt | awk '{print $1}')
          {
            echo ""
            echo "### Artifact Download"
            echo "[Download asset-scan-report](${{ steps.upload-report.outputs.artifact-url }})"
            echo "File size: **$SIZE bytes**"
            echo "SHA256: \`$CHECKSUM\`"
            echo "Generated: **$TS**"
          } >> "$GITHUB_STEP_SUMMARY"
          echo "checksum=$CHECKSUM" >> "$GITHUB_OUTPUT"
          # Register mask AFTER summary/output writes so annotations and the
          # rendered summary retain the real checksum value.
          echo "::add-mask::$CHECKSUM"

      - name: Re-download artifact for integrity check
        if: steps.upload-report.outcome == 'success'
        uses: actions/download-artifact@v4
        with:
          name: asset-scan-report
          path: verify-download

      - name: Verify downloaded artifact SHA256
        id: verify-sha256
        if: steps.upload-report.outcome == 'success'
        shell: bash
        run: |
          set -euo pipefail
          EXPECTED="${{ steps.summary.outputs.checksum }}"
          if [ -z "$EXPECTED" ]; then
            echo "::error::Missing expected checksum from summary step."
            exit 1
          fi
          if [ ! -f verify-download/asset-scan-report.txt ]; then
            echo "::error::Re-downloaded artifact not found at verify-download/asset-scan-report.txt"
            exit 1
          fi
          ACTUAL=$(sha256sum verify-download/asset-scan-report.txt | awk '{print $1}')
          if [ "$EXPECTED" != "$ACTUAL" ]; then
            # Emit annotations and summary BEFORE masking so real values render.
            echo "::error::Artifact integrity check failed."
            echo "::error::Expected SHA256: $EXPECTED"
            echo "::error::Actual SHA256:   $ACTUAL"
            {
              echo ""
              echo "### Artifact Integrity"
              echo ":x: **SHA256 mismatch**"
              echo ""
              echo "| | Value |"
              echo "|---|---|"
              echo "| Expected | \`$EXPECTED\` |"
              echo "| Actual   | \`$ACTUAL\` |"
            } >> "$GITHUB_STEP_SUMMARY"
            echo "::add-mask::$ACTUAL"
            exit 1
          fi
          {
            echo ""
            echo "### Artifact Integrity"
            echo ":white_check_mark: Re-downloaded artifact SHA256 matches (\`$ACTUAL\`)."
          } >> "$GITHUB_STEP_SUMMARY"
          echo "::add-mask::$ACTUAL"

      - name: Fail if verification failed
        if: steps.verify.outcome == 'failure'
        run: |
          cat asset-scan-report.txt
          exit 1
