name: Verify asset pointers

# Fails the PR if any `*.asset.json` import in src/ resolves to a missing
# file on disk. Emits inline `::error file=...` annotations so reviewers
# see the broken import on the Files Changed tab instead of digging into
# a downstream Rollup ENOENT.

on:
  pull_request:
    branches: [main]
    paths:
      - "src/**"
      - "scripts/verify-assets.ts"
      - "scripts/ci/validate-retention.sh"
      - "scripts/ci/validate-retention.test.sh"
      - "package.json"
      - "bun.lockb"
      - ".github/workflows/verify-assets.yml"
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      retention_days:
        description: "Artifact retention in days (overrides ASSET_SCAN_RETENTION_DAYS for this run)"
        required: false
        type: number
        default: 30
      max_retained:
        description: "Max number of asset-scan-report artifacts to keep (overrides ASSET_SCAN_MAX_RETAINED for this run)"
        required: false
        type: number
        default: 10

concurrency:
  group: verify-assets-${{ github.ref }}
  cancel-in-progress: true

jobs:
  retention-tests:
    name: Retention validator tests (${{ matrix.label }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 5
    permissions:
      pull-requests: write
      actions: read
    strategy:
      fail-fast: true
      matrix:
        include:
          - label: "bash 3.2 (macOS system)"
            os: macos-latest
            container: ""
          - label: "bash 5 (Ubuntu system)"
            os: ubuntu-latest
            container: ""
          - label: "bash 4.4 (container)"
            os: ubuntu-latest
            container: "bash:4.4"
          - label: "bash 5.1 (container)"
            os: ubuntu-latest
            container: "bash:5.1"
          - label: "bash 5.2 (container)"
            os: ubuntu-latest
            container: "bash:5.2"
    container: ${{ matrix.container != '' && matrix.container || null }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Print bash version
        run: bash --version

      - name: Run retention-policy unit tests
        id: unit-tests
        run: |
          bash scripts/ci/validate-retention.test.sh > test-output.txt 2>&1 || {
            EC=$?
            FAILED_LINE=$(grep -v '^[[:space:]]*$' test-output.txt | tail -n 1 | tr -d '\n\r\t\"\\' | cut -c1-300)
            FAIL_LINE_NO=$(grep -n '^[^[:space:]]' test-output.txt | tail -n 1 | cut -d: -f1)
            CTX_START=$((FAIL_LINE_NO - 5))
            [ "$CTX_START" -lt 1 ] && CTX_START=1
            CTX_END=$((FAIL_LINE_NO + 5))
            FAILED_CONTEXT=$(sed -n "${CTX_START},${CTX_END}p" test-output.txt | tr '\n\r\t\"\\' ' | ' | sed 's/  */ /g' | cut -c1-800)
            # Extract source file:line reference from failing output.
            # Walks the output bottom-up so the deepest stack frame wins, and
            # tries multiple patterns in order of specificity:
            #   node stack:  "    at fn (/path/file.ts:42:10)"  or  "    at /path/file.ts:42:10"
            #   python:      '  File "scripts/foo.py", line 42, in funcname'
            #   tsc:         "src/foo.ts(42,10): error TS1234: ..."
            #   ruby/go:     "scripts/foo.rb:42:in `method'"  /  "file.go:42 +0xab"
            #   bash xtrace: "scripts/foo.sh: line 42: ..."
            #   generic:     "path/file.ext:42[:col]"
            REPO_ROOT="${{ github.workspace }}"
            REPO_URL="${{ github.server_url }}/${{ github.repository }}"
            # Reverse so deepest frame (printed last) is considered first.
            REVERSED=$(tac test-output.txt 2>/dev/null || tail -r test-output.txt 2>/dev/null || cat test-output.txt)

            # Collect up to 3 unique frames in deepest-first order.
            FRAMES_FILE=$(mktemp)
            FRAME_COUNT=0
            MAX_FRAMES=3
            while IFS= read -r LINE; do
              [ "$FRAME_COUNT" -ge "$MAX_FRAMES" ] && break
              MATCH=""
              # Node stack frames: "at ... (file:line:col)" or "at file:line:col"
              MATCH=$(printf '%s\n' "$LINE" | grep -oE 'at [^ ]*\(?([A-Za-z0-9_./+-]+\.(ts|tsx|js|jsx|mjs|cjs)):([0-9]+):([0-9]+)\)?' | tail -n 1 | sed -E 's/.*\(?([A-Za-z0-9_./+-]+\.(ts|tsx|js|jsx|mjs|cjs)):([0-9]+):([0-9]+)\)?$/\1:\3:\4/')
              # Python traceback: File "x.py", line 42
              if [ -z "$MATCH" ]; then
                MATCH=$(printf '%s\n' "$LINE" | grep -oE 'File "[^"]+\.py", line [0-9]+' | tail -n 1 | sed -E 's/File "([^"]+)", line ([0-9]+)/\1:\2/')
              fi
              # tsc diagnostics: file.ts(42,10): error
              if [ -z "$MATCH" ]; then
                MATCH=$(printf '%s\n' "$LINE" | grep -oE '([A-Za-z0-9_./+-]+\.(ts|tsx|js|jsx))\(([0-9]+),([0-9]+)\)' | tail -n 1 | sed -E 's/([A-Za-z0-9_./+-]+):?\(([0-9]+),([0-9]+)\)/\1:\2:\3/')
              fi
              # Ruby/Go stack frames
              if [ -z "$MATCH" ]; then
                MATCH=$(printf '%s\n' "$LINE" | grep -oE '([A-Za-z0-9_./+-]+\.(rb|go|py|java|kt|rs|swift)):([0-9]+)' | tail -n 1)
              fi
              # Bash xtrace: "file.sh: line N"
              if [ -z "$MATCH" ]; then
                MATCH=$(printf '%s\n' "$LINE" | grep -oE '([A-Za-z0-9_./+-]+\.(sh|bash|zsh)): ?line [0-9]+' | tail -n 1 | sed -E 's/: ?line /:/')
              fi
              # Generic "path/file.ext:line[:col]"
              if [ -z "$MATCH" ]; then
                MATCH=$(printf '%s\n' "$LINE" | grep -oE '([A-Za-z0-9_./+-]+\.(sh|ts|tsx|js|jsx|mjs|cjs|bash|py|rb|go)):[0-9]+(:[0-9]+)?' | tail -n 1)
              fi
              if [ -n "$MATCH" ]; then
                # Dedupe by file:line (ignore column) so adjacent frames at the
                # same source line collapse to one entry.
                KEY=$(echo "$MATCH" | awk -F: '{print $1":"$2}')
                if ! grep -Fxq "$KEY" "$FRAMES_FILE.keys" 2>/dev/null; then
                  echo "$KEY" >> "$FRAMES_FILE.keys"
                  echo "$MATCH" >> "$FRAMES_FILE"
                  FRAME_COUNT=$((FRAME_COUNT + 1))
                fi
              fi
            done <<< "$REVERSED"

            # Build top-1 fields (backwards compat) and a multi-line frames block.
            FAILED_FILE=""
            FAILED_LINENO=""
            FAILED_SOURCE_URL=""
            FAILED_FRAMES=""
            FRAME_INDEX=0
            while IFS= read -r FRAME; do
              [ -z "$FRAME" ] && continue
              F_FILE=$(echo "$FRAME" | awk -F: '{print $1}')
              F_LINE=$(echo "$FRAME" | awk -F: '{print $2}')
              F_COL=$(echo "$FRAME" | awk -F: '{print $3}')
              # Normalise absolute paths to repo-relative.
              case "$F_FILE" in
                "$REPO_ROOT"/*) F_FILE="${F_FILE#$REPO_ROOT/}" ;;
                /*) F_FILE="${F_FILE#/}" ;;
              esac
              F_URL="${REPO_URL}/blob/${{ github.sha }}/${F_FILE}#L${F_LINE}"
              if [ -n "$F_COL" ]; then
                F_LABEL="${F_FILE}:${F_LINE}:${F_COL}"
              else
                F_LABEL="${F_FILE}:${F_LINE}"
              fi
              # Slack-formatted entry with link.
              ENTRY="<${F_URL}|${F_LABEL}>"
              if [ -z "$FAILED_FRAMES" ]; then
                FAILED_FRAMES="$ENTRY"
              else
                FAILED_FRAMES="${FAILED_FRAMES}\\n    ${ENTRY}"
              fi
              if [ "$FRAME_INDEX" -eq 0 ]; then
                FAILED_FILE="$F_FILE"
                FAILED_LINENO="$F_LINE"
                FAILED_SOURCE_URL="$F_URL"
              fi
              FRAME_INDEX=$((FRAME_INDEX + 1))
            done < "$FRAMES_FILE"
            rm -f "$FRAMES_FILE" "$FRAMES_FILE.keys"

            {
              echo "exit_code=${EC}"
              echo "failed_line=${FAILED_LINE}"
              echo "failed_context=${FAILED_CONTEXT}"
              echo "failed_file=${FAILED_FILE}"
              echo "failed_lineno=${FAILED_LINENO}"
              echo "failed_source_url=${FAILED_SOURCE_URL}"
              echo "failed_frames<<FRAMESEOF"
              printf '%b\n' "$FAILED_FRAMES"
              echo "FRAMESEOF"
              echo "stderr<<SLACKERR"
              head -c 800 test-output.txt
              echo "SLACKERR"
            } >> "$GITHUB_OUTPUT"
            exit $EC
          }

      - name: Notify on retention test failure
        if: failure() && github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr comment "${{ github.event.pull_request.number }}" \
            --repo "${{ github.repository }}" \
            --body ":x: **Retention test failed** on ${{ matrix.label }}. See [run logs](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})."

      - name: Send Slack notification on retention test failure
        if: failure() && env.SLACK_WEBHOOK_URL != ''
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          WORKFLOW_NAME='${{ github.workflow }}'
          JOB_NAME='Retention validator tests (${{ matrix.label }})'
          LOGS_URL='${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}'
          JOB_URL=$(gh api "/repos/${{ github.repository }}/actions/runs/${{ github.run_id }}/jobs" --jq ".jobs[] | select(.name==\"${JOB_NAME}\") | .html_url" 2>/dev/null || echo "$LOGS_URL")
          FAILED_STEP=$(gh api "/repos/${{ github.repository }}/actions/runs/${{ github.run_id }}/jobs" --jq ".jobs[] | select(.name==\"${JOB_NAME}\") | .steps[] | select(.conclusion==\"failure\") | .name" 2>/dev/null | head -n 1)
          [ -z "$FAILED_STEP" ] && FAILED_STEP='Run retention-policy unit tests'
          COMMIT_SHA='${{ github.sha }}'
          COMMIT_URL='${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}'
          FAILED_COMMAND='bash scripts/ci/validate-retention.test.sh'
          EXIT_CODE='${{ steps.unit-tests.outputs.exit_code }}'
          FAILED_LINE='${{ steps.unit-tests.outputs.failed_line }}'
          FAILED_CONTEXT='${{ steps.unit-tests.outputs.failed_context }}'
          FAILED_FILE='${{ steps.unit-tests.outputs.failed_file }}'
          FAILED_LINENO='${{ steps.unit-tests.outputs.failed_lineno }}'
          FAILED_SOURCE_URL='${{ steps.unit-tests.outputs.failed_source_url }}'
          FAILED_FRAMES=$(cat <<'FRAMESEOF'
          ${{ steps.unit-tests.outputs.failed_frames }}
          FRAMESEOF
          )
          # Strip leading indent that the heredoc preserved, then collapse to a
          # single line with escaped newlines so it fits in a Slack text field.
          FAILED_FRAMES=$(printf '%s' "$FAILED_FRAMES" | sed 's/^[[:space:]]*//' | awk 'NF' | paste -sd '\n' -)
          if [ -n "$FAILED_FILE" ] && [ -n "$FAILED_LINENO" ]; then
            if [ -n "$FAILED_SOURCE_URL" ]; then
              FAILED_SOURCE_FIELD=$(printf '<%s|%s:%s>' "$FAILED_SOURCE_URL" "$FAILED_FILE" "$FAILED_LINENO")
            else
              FAILED_SOURCE_FIELD=$(printf '%s:%s' "$FAILED_FILE" "$FAILED_LINENO")
            fi
          else
            FAILED_SOURCE_FIELD='(not detected)'
          fi
          if [ -z "$FAILED_FRAMES" ]; then
            FAILED_FRAMES_FIELD='(not detected)'
          else
            # Replace newlines with the literal \n that Slack renders as a line break.
            FAILED_FRAMES_FIELD=$(printf '%s' "$FAILED_FRAMES" | awk 'BEGIN{ORS=""} NR==1{print; next} {print "\\n    "$0}')
          fi
          STDERR='${{ steps.unit-tests.outputs.stderr }}'
          STDERR_SAFE=""
          if [ -n "$STDERR" ]; then
            STDERR_SAFE=$(printf '%s' "$STDERR" | tr '\n\r\t' '   ' | tr -d '"\\' | cut -c1-500)
          fi
          if [ -n "$EXIT_CODE" ]; then
            PAYLOAD=$(printf '{"text":":x: *%s* — retention test failed\n• Job: %s\n• Step: %s\n• Command: `%s`\n• Exit code: %s\n• Source: %s\n• Top frames:\n    %s\n• Failing line: %s\n• Context: %s\n• Error: %s\n• Commit: <%s|%s>\n• Job URL: %s"}' "$WORKFLOW_NAME" "$JOB_NAME" "$FAILED_STEP" "$FAILED_COMMAND" "$EXIT_CODE" "$FAILED_SOURCE_FIELD" "$FAILED_FRAMES_FIELD" "$FAILED_LINE" "$FAILED_CONTEXT" "$STDERR_SAFE" "$COMMIT_URL" "${COMMIT_SHA:0:7}" "$JOB_URL")
          else
            PAYLOAD=$(printf '{"text":":x: *%s* — retention test failed\n• Job: %s\n• Step: %s\n• Command: `%s`\n• Source: %s\n• Top frames:\n    %s\n• Failing line: %s\n• Context: %s\n• Commit: <%s|%s>\n• Job URL: %s"}' "$WORKFLOW_NAME" "$JOB_NAME" "$FAILED_STEP" "$FAILED_COMMAND" "$FAILED_SOURCE_FIELD" "$FAILED_FRAMES_FIELD" "$FAILED_LINE" "$FAILED_CONTEXT" "$COMMIT_URL" "${COMMIT_SHA:0:7}" "$JOB_URL")
          fi
          MAX_RETRIES=3
          DELAY=2
          MAX_DELAY=60
          RESP_HEADERS=$(mktemp)
          for i in $(seq 1 $MAX_RETRIES); do
            HTTP_CODE=$(curl -s -o /dev/null -D "$RESP_HEADERS" -w '%{http_code}' -X POST -H 'Content-type: application/json' \
              --data "$PAYLOAD" \
              "$SLACK_WEBHOOK_URL")
            if [ "$HTTP_CODE" -eq 200 ]; then
              echo "Slack notification sent successfully."
              rm -f "$RESP_HEADERS"
              exit 0
            fi
            # Respect Retry-After header on 429 (rate limit) or 503 responses.
            WAIT=$DELAY
            USE_JITTER=true
            if [ "$HTTP_CODE" -eq 429 ] || [ "$HTTP_CODE" -eq 503 ]; then
              RETRY_AFTER=$(grep -i '^retry-after:' "$RESP_HEADERS" | tail -n1 | sed -E 's/^[Rr]etry-[Aa]fter:[[:space:]]*([0-9]+).*/\1/' | tr -d '\r\n')
              if [ -n "$RETRY_AFTER" ] && [ "$RETRY_AFTER" -gt 0 ] 2>/dev/null; then
                WAIT=$RETRY_AFTER
                USE_JITTER=false
                if [ "$WAIT" -gt "$MAX_DELAY" ]; then WAIT=$MAX_DELAY; fi
                echo "Slack rate-limited (HTTP $HTTP_CODE). Honouring Retry-After: ${WAIT}s (attempt $i/$MAX_RETRIES)."
              else
                echo "Slack returned HTTP $HTTP_CODE without parseable Retry-After. Backing off ${WAIT}s (attempt $i/$MAX_RETRIES)."
              fi
            else
              echo "Slack notification attempt $i/$MAX_RETRIES failed (HTTP $HTTP_CODE). Retrying in ${WAIT}s..."
            fi
            if [ "$USE_JITTER" = "true" ]; then
              # Add up to 50% random jitter to avoid synchronized retries across matrix jobs.
              JITTER=$((RANDOM % (DELAY / 2 + 1)))
              WAIT=$((WAIT + JITTER))
            fi
            sleep "$WAIT"
            DELAY=$((DELAY * 2))
            if [ "$DELAY" -gt "$MAX_DELAY" ]; then DELAY=$MAX_DELAY; fi
          done
          rm -f "$RESP_HEADERS"
          echo "::error::Slack notification failed after $MAX_RETRIES attempts."


  verify:
    name: Scan for missing .asset.json references
    needs: retention-tests
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
      checks: write
      pull-requests: write
      actions: write
    steps:
      - name: Validate workflow inputs
        if: github.event_name == 'workflow_dispatch'
        run: |
          RD_RAW="${{ inputs.retention_days }}"
          MR_RAW="${{ inputs.max_retained }}"

          validate_int() {
            local name="$1" raw="$2" min="$3" max="$4"
            local value
            value=$(echo "$raw" | sed 's/^[[:space:]]*//;s/[[:space:]]*$//')
            if [ -z "$value" ]; then
              echo "::error::Invalid $name: input is empty or whitespace-only. Must be an integer between $min and $max (inclusive)."
              return 1
            fi
            if ! [[ "$value" =~ ^[0-9]+$ ]]; then
              echo "::error::Invalid $name: '$raw' is not a valid integer. Must be an integer between $min and $max (inclusive)."
              return 1
            fi
            if [ "$value" -lt "$min" ] || [ "$value" -gt "$max" ]; then
              echo "::error::Invalid $name: $value. Must be between $min and $max (inclusive)."
              return 1
            fi
          }

          validate_int "retention_days" "$RD_RAW" 1 365 || exit 1
          validate_int "max_retained" "$MR_RAW" 1 100 || exit 1

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile


      - name: Verify asset pointers (annotates PR on failure)
        id: verify
        run: bunx tsx scripts/verify-assets.ts > asset-scan-report.txt 2>&1
        continue-on-error: true

      - name: Determine retention policy
        id: retention
        shell: bash
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            DAYS_RAW="${{ inputs.retention_days }}"
            DAYS_SOURCE="workflow_dispatch input"
            MAX_RAW="${{ inputs.max_retained }}"
            MAX_SOURCE="workflow_dispatch input"
          else
            DAYS_RAW="${{ vars.ASSET_SCAN_RETENTION_DAYS }}"
            DAYS_SOURCE="ASSET_SCAN_RETENTION_DAYS repository variable"
            MAX_RAW="${{ vars.ASSET_SCAN_MAX_RETAINED }}"
            MAX_SOURCE="ASSET_SCAN_MAX_RETAINED repository variable"
          fi

          DAYS=$(echo "$DAYS_RAW" | sed 's/^[[:space:]]*//;s/[[:space:]]*$//')
          MAX=$(echo "$MAX_RAW" | sed 's/^[[:space:]]*//;s/[[:space:]]*$//')

          if [ -z "$DAYS" ]; then
            DAYS=30; DAYS_SOURCE="fallback (default)"
          elif ! [[ "$DAYS" =~ ^[0-9]+$ ]]; then
            echo "::error::Invalid retention_days from ${DAYS_SOURCE}: '$DAYS_RAW' is not a valid integer. Must be an integer between 1 and 365 (inclusive)."
            exit 1
          elif [ "$DAYS" -lt 1 ] || [ "$DAYS" -gt 365 ]; then
            echo "::error::Invalid retention_days from ${DAYS_SOURCE}: $DAYS. Must be between 1 and 365 (inclusive)."
            exit 1
          fi

          if [ -z "$MAX" ]; then
            MAX=10; MAX_SOURCE="fallback (default)"
          elif ! [[ "$MAX" =~ ^[0-9]+$ ]]; then
            echo "::error::Invalid max_retained from ${MAX_SOURCE}: '$MAX_RAW' is not a valid integer. Must be an integer between 1 and 100 (inclusive)."
            exit 1
          elif [ "$MAX" -lt 1 ] || [ "$MAX" -gt 100 ]; then
            echo "::error::Invalid max_retained from ${MAX_SOURCE}: $MAX. Must be between 1 and 100 (inclusive)."
            exit 1
          fi

          echo "days=$DAYS" >> "$GITHUB_OUTPUT"
          echo "max_retained=$MAX" >> "$GITHUB_OUTPUT"
          echo "Artifact retention: $DAYS day(s); max retained: $MAX"
          {
            echo "### Artifact Retention"
            echo "- Retention period: **$DAYS day(s)** (source: $DAYS_SOURCE)"
            echo "- Max retained artifacts: **$MAX** (source: $MAX_SOURCE)"
            echo "- Workflow run ID: ${{ github.run_id }}"
            echo "- Artifact name: asset-scan-report"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload scan report
        id: upload-report
        if: steps.verify.outcome != 'skipped'
        uses: actions/upload-artifact@v4
        with:
          name: asset-scan-report
          path: asset-scan-report.txt
          retention-days: ${{ steps.retention.outputs.days }}

      - name: Add artifact download link to summary
        id: summary
        if: steps.upload-report.outcome == 'success'
        shell: bash
        run: |
          set -euo pipefail
          SIZE=$(stat -c%s asset-scan-report.txt)
          TS=$(date -u +"%Y-%m-%d %H:%M:%S UTC")
          CHECKSUM=$(sha256sum asset-scan-report.txt | awk '{print $1}')
          {
            echo ""
            echo "### Artifact Download"
            echo "[Download asset-scan-report](${{ steps.upload-report.outputs.artifact-url }})"
            echo "File size: **$SIZE bytes**"
            echo "SHA256: \`$CHECKSUM\`"
            echo "Generated: **$TS**"
          } >> "$GITHUB_STEP_SUMMARY"
          echo "checksum=$CHECKSUM" >> "$GITHUB_OUTPUT"
          # Register mask AFTER summary/output writes so annotations and the
          # rendered summary retain the real checksum value.
          echo "::add-mask::$CHECKSUM"

      - name: Re-download artifact for integrity check
        if: steps.upload-report.outcome == 'success'
        uses: actions/download-artifact@v4
        with:
          name: asset-scan-report
          path: verify-download

      - name: Verify downloaded artifact SHA256
        id: verify-sha256
        if: steps.upload-report.outcome == 'success'
        shell: bash
        run: |
          set -euo pipefail
          EXPECTED="${{ steps.summary.outputs.checksum }}"
          if [ -z "$EXPECTED" ]; then
            echo "::error::Missing expected checksum from summary step."
            exit 1
          fi
          if [ ! -f verify-download/asset-scan-report.txt ]; then
            echo "::error::Re-downloaded artifact not found at verify-download/asset-scan-report.txt"
            exit 1
          fi
          ACTUAL=$(sha256sum verify-download/asset-scan-report.txt | awk '{print $1}')
          if [ "$EXPECTED" != "$ACTUAL" ]; then
            # Emit annotations and summary BEFORE masking so real values render.
            echo "::error::Artifact integrity check failed."
            echo "::error::Expected SHA256: $EXPECTED"
            echo "::error::Actual SHA256:   $ACTUAL"
            {
              echo ""
              echo "### Artifact Integrity"
              echo ":x: **SHA256 mismatch**"
              echo ""
              echo "| | Value |"
              echo "|---|---|"
              echo "| Expected | \`$EXPECTED\` |"
              echo "| Actual   | \`$ACTUAL\` |"
            } >> "$GITHUB_STEP_SUMMARY"
            echo "::add-mask::$ACTUAL"
            exit 1
          fi
          {
            echo ""
            echo "### Artifact Integrity"
            echo ":white_check_mark: Re-downloaded artifact SHA256 matches (\`$ACTUAL\`)."
          } >> "$GITHUB_STEP_SUMMARY"
          echo "::add-mask::$ACTUAL"

      - name: Fail if verification failed
        if: steps.verify.outcome == 'failure'
        run: |
          cat asset-scan-report.txt
          exit 1

      - name: Cleanup old asset-scan-report artifacts
        # Runs even if verification failed so stale artifacts don't accumulate.
        if: always() && steps.upload-report.outcome == 'success'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ARTIFACT_NAME: asset-scan-report
          RETENTION_DAYS: ${{ steps.retention.outputs.days }}
          KEEP_LAST: ${{ steps.retention.outputs.max_retained }}
          CURRENT_ARTIFACT_ID: ${{ steps.upload-report.outputs.artifact-id }}
          REPO: ${{ github.repository }}
        shell: bash
        run: |
          set -euo pipefail
          : "${RETENTION_DAYS:=30}"
          CUTOFF_EPOCH=$(date -u -d "${RETENTION_DAYS} days ago" +%s)
          echo "Cleaning '${ARTIFACT_NAME}' artifacts older than ${RETENTION_DAYS} day(s) (keeping newest ${KEEP_LAST})."

          # Paginate all artifacts matching the name, newest first by created_at.
          MAPPING=$(gh api --paginate \
            -H "Accept: application/vnd.github+json" \
            "/repos/${REPO}/actions/artifacts?name=${ARTIFACT_NAME}&per_page=100" \
            --jq '.artifacts[] | {id: .id, created_at: .created_at, expired: .expired}' \
            | jq -s 'sort_by(.created_at) | reverse')

          TOTAL=$(echo "$MAPPING" | jq 'length')
          echo "Found $TOTAL artifact(s) named '${ARTIFACT_NAME}'."

          DELETED=0
          SKIPPED=0
          # shellcheck disable=SC2016
          while IFS=$'\t' read -r ID CREATED EXPIRED INDEX; do
            [ -z "$ID" ] && continue
            if [ "$ID" = "$CURRENT_ARTIFACT_ID" ]; then
              SKIPPED=$((SKIPPED + 1))
              continue
            fi
            if [ "$EXPIRED" = "true" ]; then
              continue
            fi
            CREATED_EPOCH=$(date -u -d "$CREATED" +%s)
            if [ "$INDEX" -lt "$KEEP_LAST" ] && [ "$CREATED_EPOCH" -ge "$CUTOFF_EPOCH" ]; then
              SKIPPED=$((SKIPPED + 1))
              continue
            fi
            if gh api -X DELETE \
              -H "Accept: application/vnd.github+json" \
              "/repos/${REPO}/actions/artifacts/${ID}" >/dev/null 2>&1; then
              DELETED=$((DELETED + 1))
              echo "Deleted artifact id=$ID created=$CREATED"
            else
              echo "::warning::Failed to delete artifact id=$ID (created=$CREATED)"
            fi
          done < <(echo "$MAPPING" | jq -r 'to_entries[] | [.value.id, .value.created_at, .value.expired, .key] | @tsv')

          {
            echo ""
            echo "### Artifact Cleanup"
            echo "- Scanned: **$TOTAL**"
            echo "- Deleted: **$DELETED**"
            echo "- Retained: **$SKIPPED** (current run + newest ${KEEP_LAST} within ${RETENTION_DAYS}d)"
          } >> "$GITHUB_STEP_SUMMARY"
