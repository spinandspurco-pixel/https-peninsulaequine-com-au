name: Verify asset pointers

# Fails the PR if any `*.asset.json` import in src/ resolves to a missing
# file on disk. Emits inline `::error file=...` annotations so reviewers
# see the broken import on the Files Changed tab instead of digging into
# a downstream Rollup ENOENT.

on:
  pull_request:
    branches: [main]
    paths:
      - "src/**"
      - "scripts/verify-assets.ts"
      - "package.json"
      - "bun.lockb"
      - ".github/workflows/verify-assets.yml"
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: verify-assets-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Scan for missing .asset.json references
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
      checks: write
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Verify asset pointers (annotates PR on failure)
        run: bunx tsx scripts/verify-assets.ts
